# 온디맨드 종목 수집 (Phase 3)
#
# 웹에서 "수집 요청"을 누르면 Vercel API가 이 워크플로우를 원격 실행한다.
# 해당 종목의 최근 공시를 RAG 인덱싱만 수행 (브리핑·메일 없음).
name: collect-company

on:
  workflow_dispatch:
    inputs:
      company:
        description: "DART 등록 법인명 (예: 현대차)"
        required: true
        type: string

permissions: {} # 저장소에 아무것도 쓰지 않는다

concurrency:
  group: collect-${{ inputs.company }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Collect and index company filings
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          # SEC EDGAR는 User-Agent에 연락처(이메일)가 없으면 403으로 차단한다
          SEC_USER_AGENT: "stock-briefing personal project ${{ secrets.SMTP_USER }}"
        # 최근 90일 공시를 최대 15건까지 인덱싱 (임베딩 예산 보호)
        run: python -m pipeline.main --index-only --lookback 90 --companies "${{ inputs.company }}"
