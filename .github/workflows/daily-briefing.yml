# 매일 아침 자동으로 브리핑 파이프라인 실행
#
# 왜 GitHub Actions인가:
# - public 저장소면 실행 시간 무제한 무료 → 서버 비용 0원
# - cron 스케줄 + secrets 관리가 내장 → 이것 자체가 CI/CD 포트폴리오 요소
#
# 시간 주의: cron은 UTC 기준. 22:30 UTC = 07:30 KST/JST
name: daily-briefing

on:
  schedule:
    - cron: "30 22 * * 1-5" # UTC 월~금 22:30 = KST 화~토 07:30 (월~금 공시를 다음날 아침 브리핑)
  workflow_dispatch: # Actions 탭에서 수동 실행 버튼 활성화 (테스트용)

permissions:
  contents: write # 브리핑 JSON을 저장소에 커밋하기 위해 필요
  actions: write # 커밋 후 Pages 배포 워크플로우를 트리거하기 위해 필요

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run briefing pipeline
        env:
          # 모델명은 비밀이 아니므로 secrets 대신 평문으로 지정
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash-lite' }}
          SEND_EMAIL: ${{ vars.SEND_EMAIL || 'true' }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          # Phase 2 (RAG): 아래 두 secrets를 등록하면 임베딩 저장이 자동 활성화됨
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python -m pipeline.main

      # 생성된 브리핑 JSON을 저장소에 커밋 → GitHub Pages 대시보드에 반영됨
      - name: Commit briefing data
        id: commit
        run: |
          git config user.name "briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "briefing: $(TZ=Asia/Seoul date +%F)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # 봇 커밋은 push 트리거를 깨우지 못하므로(GitHub 보안 정책) 배포를 직접 호출
      - name: Trigger pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main
